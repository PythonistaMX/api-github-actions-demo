name: Despliega en Cloud Run

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_version:
        description: "Versión ya publicada en AR para re-deploy (ej: 1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-deploy:
    # Solo tags estables (sin sufijo prerelease) o dispatch manual.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ vars.DEPLOY_ENVIRONMENT || 'prod' }}
    env:
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Determinar versión ──────────────────────────────────────────────────
      - name: Determinar versión de imagen
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_VERSION="${{ inputs.image_version }}"
          else
            IMAGE_VERSION="${{ github.ref_name }}"
            IMAGE_VERSION="${IMAGE_VERSION#v}"
          fi

          if ! [[ "$IMAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Versión inválida: '$IMAGE_VERSION'. Usa formato semver estable (ej: 1.2.3)."
            exit 1
          fi

          ROLLOUT_TAG="v${IMAGE_VERSION}"
          ROLLOUT_TAG=$(echo "$ROLLOUT_TAG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')
          ROLLOUT_TAG="${ROLLOUT_TAG:0:63}"

          echo "version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "rollout_tag=$ROLLOUT_TAG" >> "$GITHUB_OUTPUT"
          echo "image_name_lower=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ── Autenticación ───────────────────────────────────────────────────────
      - name: Autenticar en GCP via OIDC
        id: gcp_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login en Artifact Registry
        uses: docker/login-action@04bf81902ca5d9c8e9f40ca42da112a7cb239165
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Login en GHCR
        uses: docker/login-action@04bf81902ca5d9c8e9f40ca42da112a7cb239165
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build (solo en push automático, no en re-deploy manual) ────────────
      - name: Lint Dockerfile
        if: github.event_name != 'workflow_dispatch'
        run: docker run --rm -i hadolint/hadolint:v2.12.0 < Dockerfile

      - name: Trivy config scan
        if: github.event_name != 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          hide-progress: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Build y publicar imagen
        if: github.event_name != 'workflow_dispatch'
        id: build_and_push
        uses: docker/build-push-action@473e09f9b5aedf66570255d5249136a73b8f2d86
        with:
          context: .
          push: true
          tags: |
            ${{ vars.GCP_ARTIFACT_REGISTRY }}/${{ vars.GCP_CLOUD_RUN_SERVICE }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.image_name_lower }}:${{ steps.version.outputs.version }}

      # ── Supply chain security ───────────────────────────────────────────────
      - name: Build immutable image reference
        if: github.event_name != 'workflow_dispatch'
        id: image_ref
        run: |
          IMAGE_REF="ghcr.io/${{ steps.version.outputs.image_name_lower }}@${{ steps.build_and_push.outputs.digest }}"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan
        if: github.event_name != 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image_ref.outputs.image_ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        if: github.event_name != 'workflow_dispatch'
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install Cosign
        if: github.event_name != 'workflow_dispatch'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Generate SBOM (SPDX)
        if: github.event_name != 'workflow_dispatch'
        run: syft "$IMAGE_REF" -o spdx-json=sbom.spdx.json

      - name: Sign image (keyless with OIDC)
        if: github.event_name != 'workflow_dispatch'
        run: cosign sign --yes "$IMAGE_REF"

      - name: Attach SBOM attestation
        if: github.event_name != 'workflow_dispatch'
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Upload SBOM artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-prod-${{ github.sha }}
          path: sbom.spdx.json
          if-no-files-found: error

      # ── Despliegue blue/green ───────────────────────────────────────────────
      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Capturar revisión activa antes del deploy
        run: |
          PREV_REVISION=$(gcloud run services describe ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --format "value(status.traffic[0].revisionName)")
          echo "PREV_REVISION=$PREV_REVISION" >> "$GITHUB_ENV"

      - name: Desplegar en Cloud Run sin enviar tráfico
        run: |
          gcloud run deploy ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --image "${{ vars.GCP_ARTIFACT_REGISTRY }}/${{ vars.GCP_CLOUD_RUN_SERVICE }}:${{ steps.version.outputs.version }}" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --update-env-vars "APP_ENV=prod" \
            --add-cloudsql-instances "${{ vars.GCP_CLOUD_SQL_CONNECTION_NAME }}" \
            --update-secrets "APP_SECRET_KEY=APP_SECRET_KEY:latest,APP_SECURITY_PASSWORD_SALT=APP_SECURITY_PASSWORD_SALT:latest" \
            --no-traffic \
            --tag "${{ steps.version.outputs.rollout_tag }}"

      - name: Obtener URL de la revisión candidata
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --format "value(status.url)")
          BASE="${SERVICE_URL#https://}"
          CANDIDATE_URL="https://${{ steps.version.outputs.rollout_tag }}---${BASE}"
          echo "CANDIDATE_URL=$CANDIDATE_URL" >> "$GITHUB_ENV"

      - name: Smoke test — verificar respuesta HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -H "Authorization: Bearer $(gcloud auth print-identity-token --impersonate-service-account=${{ vars.GCP_SERVICE_ACCOUNT }})" \
            "$CANDIDATE_URL/api/alumnos/")
          echo "Smoke test status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test falló (HTTP $STATUS) — no se promoverá tráfico."
            exit 1
          fi
          echo "Smoke test exitoso (HTTP $STATUS)."

      - name: Promover tráfico a la nueva revisión
        if: success()
        run: |
          gcloud run services update-traffic ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --to-latest

      - name: Rollback — restaurar tráfico a la revisión anterior
        if: failure()
        run: |
          gcloud run services update-traffic ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --to-revisions=${PREV_REVISION}=100
