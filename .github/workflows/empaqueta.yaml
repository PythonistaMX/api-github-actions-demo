name: Empaqueta con tox

on:
  workflow_dispatch:

permissions:
  # Mínimo necesario para checkout.
  contents: read

jobs:
  calidad:
    # Gate de calidad obligatorio: el empaquetado no inicia si falla.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: test
    env:
      APP_ENV: test
      APP_TESTING: "1"
      APP_SEED_DATA: "1"
      DATABASE_URL: ${{ vars['DATABASE_URL'] }}
      APP_SECRET_KEY: ${{ secrets['APP_SECRET_KEY'] }}
      APP_SECURITY_PASSWORD_SALT: ${{ secrets['APP_SECURITY_PASSWORD_SALT'] }}

    steps:
    - uses: actions/checkout@v7

    - name: Instalar uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.11"

    - name: Instalar dependencias desde lockfile
      # --frozen garantiza reproducibilidad y verificación de hashes SHA-256.
      run: uv sync --frozen --extra dev

    - name: Lint con ruff
      run: uv run ruff check .

    - name: Formato con ruff
      run: uv run ruff format --check .

    - name: Tipado con mypy
      run: uv run mypy .

    - name: Pruebas con pytest y cobertura
      run: uv run pytest --cov=apiflaskdemo --cov-fail-under=80

  build_artifact:
    # Solo empaqueta si el job calidad pasó completamente.
    needs: calidad
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: dev
    env:
      APP_ENV: dev
      DATABASE_URL: ${{ vars['DATABASE_URL'] }}
      APP_SECRET_KEY: ${{ secrets['APP_SECRET_KEY'] }}
      APP_SECURITY_PASSWORD_SALT: ${{ secrets['APP_SECURITY_PASSWORD_SALT'] }}

    steps:
    - uses: actions/checkout@v7

    - name: Instalar uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.11"

    - name: Instalar dependencias desde lockfile
      run: uv sync --frozen --extra dev

    - name: Empaquetar con tox
      # tox ejecuta la matriz completa de entornos (py311, py312, py313) definida en tox.ini.
      run: uv run tox

    - name: Mover paquete al directorio de salida
      run: |
        mkdir $GITHUB_WORKSPACE/paquete
        cp $GITHUB_WORKSPACE/.tox/.pkg/dist/*.tar.gz $GITHUB_WORKSPACE/paquete/
        ls $GITHUB_WORKSPACE/paquete/

    - name: Subir paquete como artefacto del workflow
      uses: actions/upload-artifact@v7
      with:
        name: assets-for-download
        path: paquete
        if-no-files-found: error
