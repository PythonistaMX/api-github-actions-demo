name: Publish image to Packages

on:
  push:
    tags:
      # v1.2.3         → prod  (release estable)
      # v1.2.3-rc.1    → test  (release candidate)
      # v1.2.3-beta.1  → test  (beta)
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Entorno destino — solo para re-deploys de emergencia"
        required: true
        default: test
        type: choice
        options:
          - test
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target_environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "target=test" >> "$GITHUB_OUTPUT"
          else
            echo "target=prod" >> "$GITHUB_OUTPUT"
          fi

  push_to_registry:
    needs: resolve-env
    name: Push Docker image to Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ needs.resolve-env.outputs.target }}
    env:
      APP_ENV: ${{ needs.resolve-env.outputs.target }}
      DATABASE_URL: ${{ vars['DATABASE_URL'] }}
      APP_SECRET_KEY: ${{ secrets['APP_SECRET_KEY'] }}
      APP_SECURITY_PASSWORD_SALT: ${{ secrets['APP_SECURITY_PASSWORD_SALT'] }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        # Falla temprano por malas practicas del Dockerfile.
        run: docker run --rm -i hadolint/hadolint:v2.12.0 < Dockerfile

      - name: Trivy config scan
        # Escanea solo el Dockerfile del build para evitar falsos bloqueos por
        # configuraciones no relacionadas con la imagen a publicar.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          hide-progress: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag inmutable por commit para trazabilidad.
            type=sha
            # Tag semver desde el git tag.
            type=semver,pattern={{version}}
            # latest solo en releases estables de la rama por defecto.
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Build immutable image reference
        id: image_ref
        run: |
          # github.repository puede contener mayúsculas (ej. "PythonistaMX/repo").
          # docker/build-push-action normaliza a lowercase al publicar, pero cuando
          # construimos IMAGE_REF manualmente hay que hacerlo explícitamente:
          # la librería Go distribution/reference que usa Trivy rechaza nombres con
          # mayúsculas siguiendo la especificación OCI.
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}@${{ steps.build_and_push.outputs.digest }}"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan
        # GHCR requiere autenticación incluso para leer imágenes (a diferencia de
        # Docker Hub, que permite pulls públicos sin credenciales). Sin TRIVY_USERNAME
        # y TRIVY_PASSWORD, Trivy no puede inicializar el artifact y falla con
        # "could not parse image reference" antes de llegar al escaneo real.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image_ref.outputs.image_ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX)
        run: syft "$IMAGE_REF" -o spdx-json=sbom.spdx.json

      - name: Sign image (keyless with OIDC)
        run: cosign sign --yes "$IMAGE_REF"

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"


      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-ghcr-${{ github.sha }}
          path: sbom.spdx.json
          if-no-files-found: error

      - name: Autenticar en GCP via OIDC — solo prod
        if: needs.resolve-env.outputs.target == 'prod'
        id: gcp_auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login en Artifact Registry — solo prod
        if: needs.resolve-env.outputs.target == 'prod'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Publicar imagen en Artifact Registry — solo prod
        if: needs.resolve-env.outputs.target == 'prod'
        id: ar_push
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          GHCR_IMAGE="ghcr.io/${IMAGE_NAME_LOWER}:${{ github.ref_name }}"
          AR_IMAGE="${{ vars.GCP_ARTIFACT_REGISTRY }}/${{ vars.GCP_CLOUD_RUN_SERVICE }}:${{ github.ref_name }}"
          docker tag "$GHCR_IMAGE" "$AR_IMAGE"
          docker push "$AR_IMAGE"
          echo "image=$AR_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Desplegar en Cloud Run — solo prod
        if: needs.resolve-env.outputs.target == 'prod'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.ar_push.outputs.image }}
          env_vars: |
            APP_ENV=prod
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            APP_SECRET_KEY=APP_SECRET_KEY:latest
            APP_SECURITY_PASSWORD_SALT=APP_SECURITY_PASSWORD_SALT:latest
