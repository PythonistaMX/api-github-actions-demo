name: Publish image to Packages

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Entorno destino (test o prod)"
        required: true
        default: test
        type: choice
        options:
          - test
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push_to_registry:
    name: Push Docker image to Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.target_environment }}
    env:
      # Variables/secretos inyectados por entorno de GitHub Actions.
      APP_ENV: ${{ inputs.target_environment }}
      DATABASE_URL: ${{ vars.DATABASE_URL }}
      APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
      APP_SECURITY_PASSWORD_SALT: ${{ secrets.APP_SECURITY_PASSWORD_SALT }}
    permissions:
      # Permisos minimos necesarios para publicar en GHCR.
      contents: read
      packages: write
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        # Falla temprano por malas practicas del Dockerfile.
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Trivy config scan
        # Bloquea el publish ante hallazgos de alta severidad.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          hide-progress: true
          severity: HIGH,CRITICAL
          exit-code: '1'
      
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag inmutable por commit para trazabilidad.
            type=sha
            # latest solo en rama por defecto para evitar ambiguedad.
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
