version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Limita los PRs abiertos simultáneamente para reducir ruido en el repositorio.
    open-pull-requests-limit: 5
    groups:
      # Agrupa todas las herramientas de desarrollo en un solo PR semanal
      # en lugar de un PR por herramienta; reduce el ruido de revisión.
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "coverage*"
          - "tox"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Agrupa las acciones de Docker en un PR para revisarlas juntas,
      # ya que suelen actualizarse coordinadamente.
      docker-actions:
        patterns:
          - "docker/*"
      # Agrupa las acciones de GCP para revisión conjunta.
      gcp-actions:
        patterns:
          - "google-github-actions/*"

  # Monitorea actualizaciones de la imagen base del Dockerfile.
  # Cuando python:3.11-slim tenga nuevo digest, Dependabot abre un PR.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
